<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Staff Trainer</h1>
  </header>

  <main class="layout">
    <section class="practice-area">
      <div id="prompt" class="prompt"></div>

      <div id="staffContainer" class="staff-container"></div>
      <div id="keyboardContainer" class="keyboard-container hidden"></div>

      <div id="letterButtons" class="letter-buttons hidden"></div>

      <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
    </section>

    <aside class="side-panel">
      <div class="settings-panel">
        <h2>Settings</h2>

        <fieldset class="settings-group">
          <legend>Clef</legend>
          <label>
            <input type="checkbox" class="clef-checkbox" data-value="treble" />
            Treble
          </label>
          <label>
            <input type="checkbox" class="clef-checkbox" data-value="bass" />
            Bass
          </label>
        </fieldset>

        <fieldset class="settings-group">
          <legend>Practice types</legend>
          <label>
            <input type="checkbox" class="question-type-checkbox" data-value="letter-to-staff" />
            Letter &rarr; Staff
          </label>
          <label>
            <input type="checkbox" class="question-type-checkbox" data-value="staff-to-letter" />
            Staff &rarr; Letter
          </label>
          <label>
            <input type="checkbox" class="question-type-checkbox" data-value="letter-to-keyboard" />
            Letter &rarr; Keyboard
          </label>
          <label>
            <input type="checkbox" class="question-type-checkbox" data-value="keyboard-to-letter" />
            Keyboard &rarr; Letter
          </label>
        </fieldset>

        <label class="extended-range-label">
          <input type="checkbox" id="extendedRangeToggle" />
          Extended range (adds ledger-line notes)
        </label>

        <p id="settingsWarning" class="settings-warning" role="alert"></p>
      </div>

      <div class="stats-panel">
        <h2>Stats</h2>
        <p id="overallStats" class="overall-stats">0 / 0 correct (0%)</p>

        <table class="per-note-table">
          <thead>
            <tr>
              <th>Note</th>
              <th>Correct</th>
              <th>Accuracy</th>
            </tr>
          </thead>
          <tbody id="perNoteStatsBody"></tbody>
        </table>

        <button id="resetStatsBtn" class="reset-btn" type="button">Reset Stats</button>
      </div>
    </aside>
  </main>

  <script src="js/notes.js"></script>
  <script src="js/staff.js"></script>
  <script src="js/keyboard.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
