name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'style.css'
      - 'js/**'
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Copy current web app into www/
        working-directory: android-app
        run: |
          mkdir -p www/js
          cp ../index.html ../style.css www/
          cp ../js/*.js www/js/

      - name: Sync Capacitor Android project
        working-directory: android-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: staff-trainer-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to a stable release
        working-directory: android-app/android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes --repo "${{ github.repository }}" || true
          gh release create android-latest \
            app/build/outputs/apk/debug/app-debug.apk \
            --repo "${{ github.repository }}" \
            --title "Staff Trainer (Android, offline APK)" \
            --notes "Auto-built debug APK bundling the current web app for fully offline use. Sideload only — not signed for the Play Store. Rebuilt automatically whenever the web app changes."
